name: Deploy Staging to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_api:
        description: Deploy the API service
        type: boolean
        default: true
      deploy_web:
        description: Deploy the web service
        type: boolean
        default: true
      ensure_environment:
        description: Create the Railway staging environment if missing
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: railway-staging
  cancel-in-progress: true

env:
  RAILWAY_ENVIRONMENT: staging
  RAILWAY_BASE_ENVIRONMENT: production
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

jobs:
  ensure-staging-environment:
    name: Ensure Railway staging environment
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.ensure_environment }}
    environment: staging
    steps:
      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Create staging environment when missing
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_API_TOKEN:-}" ]; then
            echo "::error::RAILWAY_API_TOKEN is required to create or inspect Railway environments."
            exit 1
          fi

          if [ -z "${RAILWAY_PROJECT_ID:-}" ]; then
            echo "::error::RAILWAY_PROJECT_ID is required."
            exit 1
          fi

          railway link \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_BASE_ENVIRONMENT"

          railway environment list --json > environments.json

          if jq -e --arg name "$RAILWAY_ENVIRONMENT" '.. | objects | select(.name? == $name)' environments.json >/dev/null; then
            echo "Railway environment '$RAILWAY_ENVIRONMENT' already exists."
            exit 0
          fi

          railway environment new "$RAILWAY_ENVIRONMENT" \
            --duplicate "$RAILWAY_BASE_ENVIRONMENT" \
            --yes

  deploy:
    name: Deploy ${{ matrix.name }} to Railway staging
    runs-on: ubuntu-latest
    needs: ensure-staging-environment
    if: ${{ always() && needs.ensure-staging-environment.result != 'failure' }}
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            service_secret: RAILWAY_API_SERVICE
            config: .railway-config/api.railway.json
          - name: web
            service_secret: RAILWAY_WEB_SERVICE
            config: .railway-config/web.railway.json
    env:
      RAILWAY_SERVICE_NAME: ${{ secrets[matrix.service_secret] }}
      DEPLOY_THIS_SERVICE: >-
        ${{
          github.event_name == 'push' ||
          (matrix.name == 'api' && inputs.deploy_api) ||
          (matrix.name == 'web' && inputs.deploy_web)
        }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.DEPLOY_THIS_SERVICE == 'true' }}

      - name: Install Railway CLI
        if: ${{ env.DEPLOY_THIS_SERVICE == 'true' }}
        run: npm install --global @railway/cli

      - name: Validate Railway deployment inputs
        if: ${{ env.DEPLOY_THIS_SERVICE == 'true' }}
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::error::RAILWAY_TOKEN is required to deploy to Railway."
            exit 1
          fi

          if [ -z "${RAILWAY_PROJECT_ID:-}" ]; then
            echo "::error::RAILWAY_PROJECT_ID is required."
            exit 1
          fi

          if [ -z "${RAILWAY_SERVICE_NAME:-}" ]; then
            echo "::error::${{ matrix.service_secret }} is required."
            exit 1
          fi

      - name: Prepare Railway deploy context
        if: ${{ env.DEPLOY_THIS_SERVICE == 'true' }}
        run: |
          set -euo pipefail

          deploy_dir=".railway-deploy/${{ matrix.name }}"
          mkdir -p "$deploy_dir"

          rsync -a --delete \
            --exclude ".git" \
            --exclude ".railway" \
            --exclude ".railway-deploy" \
            --exclude "node_modules" \
            --exclude "*/node_modules" \
            --exclude "apps/web/.next" \
            ./ "$deploy_dir/"

          cp "${{ matrix.config }}" "$deploy_dir/railway.json"

      - name: Deploy ${{ matrix.name }}
        if: ${{ env.DEPLOY_THIS_SERVICE == 'true' }}
        working-directory: .railway-deploy/${{ matrix.name }}
        run: |
          set -euo pipefail

          railway up \
            --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE_NAME"

      - name: Skip disabled service
        if: ${{ env.DEPLOY_THIS_SERVICE != 'true' }}
        run: echo "Skipping ${{ matrix.name }} deployment."

  smoke-test:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'success' && vars.RAILWAY_STAGING_API_URL != '' }}
    environment: staging
    steps:
      - name: Check API health endpoint
        run: |
          set -euo pipefail
          curl --fail --retry 6 --retry-delay 10 "${{ vars.RAILWAY_STAGING_API_URL }}/health"
